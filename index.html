<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>小逸罒不迷茫 · 个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            min-height: 100vh;
            min-height: 100dvh;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem;
            background-image: url('https://ts1.tc.mm.bing.net/th/id/R-C.341c660ea4f22a2ef253c572e3134db1?rik=qJ4Fb1M9wTq1Yw&riu=http%3a%2f%2fpic3.40017.cn%2fline%2fadmin%2f2015%2f04%2f30%2f09%2fj6XJMg.jpg&ehk=rS20cy%2bfJWZvkz%2bRySwTxuDAkpxgNsXyjvc7M069XLU%3d&risl=&pid=ImgRaw&r=0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(255, 100, 150, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 75%, rgba(50, 150, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 200, 50, 0.08) 0%, transparent 60%),
                rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(8px);
            z-index: 0;
            pointer-events: none;
        }
        .main-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            gap: 3.5rem;
            align-items: stretch;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            padding: 0.5rem 0;
        }
        .avatar-section {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            background: rgba(8, 12, 20, 0.40);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            padding: 2.8rem 2rem;
            border-radius: 4.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .avatar-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            background: #1a2633;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        .avatar-wrapper:hover {
            transform: scale(1.03) rotate(-3deg);
        }
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .avatar-wrapper .fallback-icon {
            font-size: 4.5rem;
            color: rgba(255, 255, 255, 0.08);
        }
        .display-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f0f6ff 0%, #8ab4d8 40%, #f0a0b0 70%, #ffd070 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .name-sub {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.20);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: -0.3rem;
        }
        .qq-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.6rem;
            padding: 0.4rem 1.6rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.30);
            letter-spacing: 3px;
            backdrop-filter: blur(4px);
        }
        .qq-info i {
            color: rgba(255, 255, 255, 0.10);
            font-size: 0.9rem;
        }
        .qq-info .qq-num {
            color: rgba(255, 255, 255, 0.50);
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }
        .content-section {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .bio-card {
            background: rgba(8, 12, 20, 0.40);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 2rem 2.5rem;
            border-radius: 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        .bio-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 70%;
            height: 100%;
            background:
                radial-gradient(ellipse, rgba(255, 100, 150, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(50, 200, 255, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        .bio-card p {
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.60);
            letter-spacing: 1.5px;
            line-height: 2;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }
        .bio-card p i {
            margin: 0 4px;
            font-size: 0.95rem;
        }
        .bio-card p .icon-cube {
            color: rgba(100, 200, 255, 0.20);
        }
        .bio-card p .icon-heart {
            color: rgba(255, 100, 150, 0.20);
        }
        .bio-card p .icon-code {
            color: rgba(255, 200, 100, 0.20);
        }
        .bio-card p .icon-cubes {
            color: rgba(100, 255, 150, 0.20);
        }
        .bio-card p .icon-pickaxe {
            color: rgba(255, 150, 100, 0.20);
        }
        .bio-card p .icon-star {
            color: rgba(255, 200, 50, 0.15);
        }
        .bio-card .bio-detail {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.30);
            letter-spacing: 0.5px;
            line-height: 1.9;
            margin-top: 0.5rem;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 2rem;
            border-left: 2px solid rgba(255, 255, 255, 0.03);
        }
        .bio-card .bio-detail span {
            display: inline-block;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.15);
            margin: 0.1rem 0.2rem;
            border: 1px solid rgba(255, 255, 255, 0.01);
        }
        .bio-card .bio-detail .highlight-blue {
            color: rgba(100, 200, 255, 0.25);
            border-color: rgba(100, 200, 255, 0.03);
        }
        .bio-card .bio-detail .highlight-gold {
            color: rgba(255, 200, 100, 0.25);
            border-color: rgba(255, 200, 100, 0.03);
        }
        .bio-card .bio-detail .highlight-green {
            color: rgba(100, 255, 150, 0.25);
            border-color: rgba(100, 255, 150, 0.03);
        }
        .bio-card .bio-detail .highlight-red {
            color: rgba(255, 150, 100, 0.25);
            border-color: rgba(255, 150, 100, 0.03);
        }
        .bio-card .bio-tags {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .bio-card .bio-tags span {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 4px;
            padding: 0.25rem 1.2rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .bio-card .bio-tags span:nth-child(1) {
            color: rgba(100, 200, 255, 0.40);
            border-color: rgba(100, 200, 255, 0.06);
        }
        .bio-card .bio-tags span:nth-child(2) {
            color: rgba(255, 200, 100, 0.40);
            border-color: rgba(255, 200, 100, 0.06);
        }
        .bio-card .bio-tags span:nth-child(3) {
            color: rgba(100, 255, 150, 0.40);
            border-color: rgba(100, 255, 150, 0.06);
        }
        .bio-card .bio-tags span:nth-child(4) {
            color: rgba(255, 150, 100, 0.40);
            border-color: rgba(255, 150, 100, 0.06);
        }
        .bio-card .bio-tags span:nth-child(5) {
            color: rgba(200, 150, 255, 0.40);
            border-color: rgba(200, 150, 255, 0.06);
        }
        .toolbox-entry {
            background: rgba(8, 12, 20, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 4rem;
            padding: 2.5rem 2.5rem;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            z-index: 10;
            will-change: transform, opacity;
        }
        .toolbox-entry::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(255, 100, 150, 0.04) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(50, 150, 255, 0.04) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 200, 50, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }
        .toolbox-entry:hover {
            background: rgba(20, 30, 50, 0.50);
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-4px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }
        .toolbox-entry i {
            font-size: 3.2rem;
            color: rgba(255, 255, 255, 0.06);
            transition: 0.3s;
            position: relative;
            z-index: 1;
        }
        .toolbox-entry:hover i {
            color: rgba(255, 200, 100, 0.12);
        }
        .toolbox-entry .card-title {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.20);
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 200, 100, 0.15));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .toolbox-entry .card-desc {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: 5px;
            position: relative;
            z-index: 1;
        }
        .danmaku-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            padding: 0.35rem 1.4rem;
            border-radius: 100px;
            background: rgba(10, 18, 30, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.015);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 1.5px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
            animation: danmakuMove linear infinite;
            will-change: transform;
            user-select: none;
        }
        .danmaku-item.color-1 {
            color: rgba(100, 200, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.02);
        }
        .danmaku-item.color-2 {
            color: rgba(255, 200, 100, 0.15);
            border-color: rgba(255, 200, 100, 0.02);
        }
        .danmaku-item.color-3 {
            color: rgba(255, 100, 150, 0.15);
            border-color: rgba(255, 100, 150, 0.02);
        }
        .danmaku-item.color-4 {
            color: rgba(100, 255, 150, 0.15);
            border-color: rgba(100, 255, 150, 0.02);
        }
        .danmaku-item.color-5 {
            color: rgba(200, 150, 255, 0.15);
            border-color: rgba(200, 150, 255, 0.02);
        }
        .danmaku-item.color-6 {
            color: rgba(255, 150, 200, 0.15);
            border-color: rgba(255, 150, 200, 0.02);
        }
        .danmaku-item.color-7 {
            color: rgba(150, 255, 200, 0.15);
            border-color: rgba(150, 255, 200, 0.02);
        }
        @keyframes danmakuMove {
            0% {
                transform: translateX(100vw) scale(0.9);
                opacity: 0;
            }
            5% {
                opacity: 1;
                transform: translateX(100vw) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateX(-200px) scale(1);
            }
            100% {
                transform: translateX(-300px) scale(0.9);
                opacity: 0;
            }
        }
        .music-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9998;
            background: rgba(8, 12, 20, 0.30);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 4rem;
            padding: 0.5rem 1.4rem 0.5rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.7rem;
            pointer-events: auto;
        }
        .music-float i {
            font-size: 1rem;
            color: rgba(255, 200, 100, 0.04);
        }
        .music-float .ctrl-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.01);
            color: rgba(255, 255, 255, 0.06);
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.6rem;
            transition: 0.2s;
        }
        .music-float .ctrl-btn:hover {
            background: rgba(255, 200, 100, 0.02);
            color: rgba(255, 200, 100, 0.10);
        }
        .music-float .track-name {
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(255, 255, 255, 0.03);
            font-size: 0.6rem;
            letter-spacing: 1px;
        }
        @media (max-width: 900px) {
            .main-container {
                gap: 2rem;
            }
            .avatar-section {
                flex: 0 0 240px;
                padding: 2rem 1.5rem;
            }
            .avatar-wrapper {
                width: 140px;
                height: 140px;
            }
            .display-name {
                font-size: 1.6rem;
            }
            .bio-card p {
                font-size: 1rem;
            }
            .toolbox-entry {
                padding: 2rem 1.8rem;
            }
            .toolbox-entry .card-title {
                font-size: 1.4rem;
            }
        }
        @media (max-width: 700px) {
            body {
                padding: 1rem;
                align-items: flex-start;
                padding-top: 1.5rem;
            }
            .main-container {
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
            }
            .avatar-section {
                flex: 0 0 auto;
                width: 100%;
                max-width: 360px;
                padding: 1.8rem 1.2rem;
                border-radius: 3rem;
            }
            .avatar-wrapper {
                width: 120px;
                height: 120px;
            }
            .display-name {
                font-size: 1.4rem;
            }
            .bio-card {
                padding: 1.5rem 1.8rem;
            }
            .bio-card p {
                font-size: 0.95rem;
            }
            .bio-card .bio-detail {
                font-size: 0.75rem;
                padding: 0.6rem 1rem;
            }
            .toolbox-entry {
                padding: 1.8rem 1.5rem;
                border-radius: 3rem;
            }
            .toolbox-entry .card-title {
                font-size: 1.2rem;
                letter-spacing: 4px;
            }
            .toolbox-entry i {
                font-size: 2.6rem;
            }
            .danmaku-item {
                font-size: 0.6rem;
                padding: 0.2rem 0.9rem;
            }
            .music-float {
                bottom: 16px;
                right: 16px;
                padding: 0.4rem 1rem;
                font-size: 0.6rem;
                gap: 0.5rem;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 0.8rem;
                padding-top: 1rem;
            }
            .avatar-wrapper {
                width: 100px;
                height: 100px;
            }
            .display-name {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }
            .qq-info {
                font-size: 0.7rem;
                padding: 0.3rem 1.2rem;
            }
            .bio-card p {
                font-size: 0.85rem;
            }
            .bio-card .bio-detail {
                font-size: 0.65rem;
                padding: 0.4rem 0.8rem;
            }
            .bio-card .bio-tags span {
                font-size: 0.6rem;
                letter-spacing: 2px;
            }
            .danmaku-item {
                font-size: 0.5rem;
                padding: 0.15rem 0.7rem;
            }
            .music-float {
                bottom: 12px;
                right: 12px;
                padding: 0.3rem 0.8rem;
                font-size: 0.55rem;
                gap: 0.4rem;
            }
            .music-float .track-name {
                max-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="danmaku-container" id="danmakuContainer"></div>
    <div class="main-container">
        <aside class="avatar-section">
            <div class="avatar-wrapper">
                <img src="xiaoyiwangbumimangdechaojiwudishuandetouxiang.png" alt="avatar" id="avatarImg" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-user-astronaut fallback-icon\'></i>';">
            </div>
            <div class="display-name">小逸罒不迷茫</div>
            <div class="name-sub">创造模式</div>
            <div class="qq-info">
                <i class="fab fa-qq"></i>
                <span class="qq-num">368750642</span>
            </div>
        </aside>
        <div class="content-section">
            <div class="bio-card">
                <p>
                    <i class="fas fa-cube icon-cube"></i>
                    我喜欢玩我的世界
                    <i class="fas fa-heart icon-heart"></i>
                    <br>
                    <span style="font-size:0.75rem; color:rgba(255,255,255,0.12); letter-spacing:5px;">
                        ︎创造模式 · 无限可能
                    </span>
                </p>
                <div class="bio-detail">
                    <i class="fas fa-terminal" style="color:rgba(255,255,255,0.06); margin-right:6px;"></i>
                    我常用指令来
                    <span class="highlight-blue">/give</span>
                    获取建筑方块，
                    <span class="highlight-gold">/fill</span>
                    快速填充地形，
                    <span class="highlight-green">/clone</span>
                    复制建筑结构，
                    <span class="highlight-red">/summon</span>
                    召唤生物和坐骑。
                    <br>
                    <i class="fas fa-code icon-code" style="margin-right:4px;"></i>
                    红石机械用
                    <span class="highlight-blue">/setblock</span>
                    和
                    <span class="highlight-gold">/testforblock</span>
                    调试，
                    <span class="highlight-green">/scoreboard</span>
                    做计分板系统，
                    <span class="highlight-red">/effect</span>
                    给玩家加状态效果。
                    <br>
                    <i class="fas fa-pickaxe icon-pickaxe" style="margin-right:4px;"></i>
                    生存模式用
                    <span class="highlight-blue">/enchant</span>
                    附魔装备，
                    <span class="highlight-gold">/repair</span>
                    修复耐久，
                    <span class="highlight-green">/trade</span>
                    刷村民交易。
                    <i class="fas fa-star icon-star" style="margin-left:6px;"></i>
                </div>
                <div class="bio-tags">
                    <span>建筑</span>
                    <span>红石</span>
                    <span>冒险</span>
                    <span>生存</span>
                    <span>指令</span>
                </div>
            </div>
            <a href="/tool" class="toolbox-entry" id="toolboxEntry">
                <i class="fas fa-toolbox"></i>
                <div class="card-title">工具箱</div>
                <div class="card-desc">实用工具合集</div>
            </a>
        </div>
    </div>
    <div class="music-float" id="musicFloat">
        <i class="fas fa-music" id="musicIcon"></i>
        <span class="track-name" id="trackName">minecraft.mp3</span>
        <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
        <button class="ctrl-btn" id="stopBtn"><i class="fas fa-stop"></i></button>
    </div>
    <script>
        (function() {
            'use strict';
            function preloadToolbox() {
                fetch('/tool').then(function(res) { return res.text(); }).then(function(html) {
                    sessionStorage.setItem('toolbox_html', html);
                }).catch(function() {});
            }
            if (window.requestIdleCallback) {
                requestIdleCallback(preloadToolbox);
            } else {
                setTimeout(preloadToolbox, 300);
            }
            var returnState = sessionStorage.getItem('toolbox_return');
            if (returnState === 'true') {
                sessionStorage.removeItem('toolbox_return');
                var entry = document.getElementById('toolboxEntry');
                entry.style.transition = 'none';
                entry.style.transform = 'scale(0.5) translateY(-80px)';
                entry.style.opacity = '0.3';
                requestAnimationFrame(function() {
                    entry.style.transition = 'all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    entry.style.transform = 'scale(1) translateY(0)';
                    entry.style.opacity = '1';
                });
            }
            var toolboxEntry = document.getElementById('toolboxEntry');
            var isTransitioning = false;
            toolboxEntry.addEventListener('click', function(e) {
                e.preventDefault();
                if (isTransitioning) return;
                isTransitioning = true;
                var rect = this.getBoundingClientRect();
                var targetX = window.innerWidth / 2 - 80;
                var targetY = 12;
                var clone = document.createElement('div');
                clone.className = 'flying-card';
                clone.innerHTML = `
                    <i class="fas fa-toolbox"></i>
                    <div class="f-title">工具箱</div>
                    <div class="f-desc">实用工具合集</div>
                `;
                clone.style.position = 'fixed';
                clone.style.zIndex = '99999';
                clone.style.pointerEvents = 'none';
                clone.style.borderRadius = '4rem';
                clone.style.background = 'rgba(8, 12, 20, 0.45)';
                clone.style.backdropFilter = 'blur(24px)';
                clone.style.webkitBackdropFilter = 'blur(24px)';
                clone.style.border = '1px solid rgba(255, 255, 255, 0.04)';
                clone.style.boxShadow = '0 40px 80px rgba(0, 0, 0, 0.6)';
                clone.style.display = 'flex';
                clone.style.flexDirection = 'column';
                clone.style.alignItems = 'center';
                clone.style.justifyContent = 'center';
                clone.style.gap = '0.4rem';
                clone.style.overflow = 'hidden';
                clone.style.padding = '1.5rem 2rem';
                clone.style.width = rect.width + 'px';
                clone.style.height = rect.height + 'px';
                clone.style.left = rect.left + 'px';
                clone.style.top = rect.top + 'px';
                clone.style.transition = 'none';
                clone.style.willChange = 'transform, opacity, width, height, top, left';
                clone.querySelector('i').style.fontSize = '2rem';
                clone.querySelector('i').style.color = 'rgba(255, 255, 255, 0.06)';
                clone.querySelector('.f-title').style.fontSize = '1rem';
                clone.querySelector('.f-title').style.fontWeight = '300';
                clone.querySelector('.f-title').style.letterSpacing = '6px';
                clone.querySelector('.f-title').style.color = 'rgba(255, 255, 255, 0.15)';
                clone.querySelector('.f-desc').style.fontSize = '0.4rem';
                clone.querySelector('.f-desc').style.color = 'rgba(255, 255, 255, 0.04)';
                clone.querySelector('.f-desc').style.letterSpacing = '4px';
                document.body.appendChild(clone);
                this.style.transition = 'opacity 0.3s ease';
                this.style.opacity = '0';
                requestAnimationFrame(function() {
                    clone.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    clone.style.width = '160px';
                    clone.style.height = '50px';
                    clone.style.left = targetX + 'px';
                    clone.style.top = targetY + 'px';
                    clone.style.borderRadius = '3rem';
                    clone.style.padding = '0.3rem 1.2rem';
                    clone.style.flexDirection = 'row';
                    clone.style.gap = '0.5rem';
                    clone.querySelector('i').style.fontSize = '1.1rem';
                    clone.querySelector('.f-title').style.fontSize = '0.75rem';
                    clone.querySelector('.f-desc').style.display = 'none';
                });
                setTimeout(function() {
                    sessionStorage.setItem('toolbox_from_home', 'true');
                    window.location.href = '/tool';
                }, 550);
                setTimeout(function() {
                    if (isTransitioning) {
                        var cloneStill = document.querySelector('.flying-card');
                        if (cloneStill) {
                            cloneStill.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            cloneStill.style.width = rect.width + 'px';
                            cloneStill.style.height = rect.height + 'px';
                            cloneStill.style.left = rect.left + 'px';
                            cloneStill.style.top = rect.top + 'px';
                            cloneStill.style.borderRadius = '4rem';
                            cloneStill.style.padding = '1.5rem 2rem';
                            cloneStill.style.flexDirection = 'column';
                            cloneStill.style.gap = '0.4rem';
                            cloneStill.querySelector('i').style.fontSize = '2rem';
                            cloneStill.querySelector('.f-title').style.fontSize = '1rem';
                            cloneStill.querySelector('.f-desc').style.display = 'block';
                            setTimeout(function() {
                                toolboxEntry.style.opacity = '1';
                                cloneStill.remove();
                                isTransitioning = false;
                            }, 650);
                        }
                    }
                }, 3000);
            });
            var audio = new Audio('minecraft.mp3');
            audio.loop = true;
            audio.volume = 0.25;
            var playPauseBtn = document.getElementById('playPauseBtn');
            var stopBtn = document.getElementById('stopBtn');
            var musicIcon = document.getElementById('musicIcon');
            var isPlaying = false;
            function updatePlayBtn() {
                playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
                musicIcon.style.color = isPlaying ? 'rgba(100,200,255,0.06)' : 'rgba(255,255,255,0.015)';
            }
            function tryAutoPlay() {
                audio.play().then(function() { isPlaying = true;
                    updatePlayBtn(); }).catch(function() { isPlaying = false;
                    updatePlayBtn(); });
            }
            playPauseBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isPlaying) { audio.pause();
                    isPlaying = false; } else { audio.play().then(function() { isPlaying = true; }).catch(function() {
                        isPlaying = false; }); }
                updatePlayBtn();
            });
            stopBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                audio.pause();
                audio.currentTime = 0;
                isPlaying = false;
                updatePlayBtn();
            });
            window.addEventListener('load', tryAutoPlay);
            document.addEventListener('click', function() {
                if (!isPlaying && audio.paused) {
                    audio.play().then(function() { isPlaying = true;
                        updatePlayBtn(); }).catch(function() {});
                }
            }, { once: false });
            var avatarImg = document.getElementById('avatarImg');
            if (avatarImg) {
                avatarImg.addEventListener('error', function() {
                    this.style.display = 'none';
                    var wrapper = this.parentElement;
                    if (wrapper) {
                        wrapper.innerHTML = '<i class="fas fa-user-astronaut fallback-icon"></i>';
                    }
                });
            }
            var danmakuContainer = document.getElementById('danmakuContainer');
            var danmakuList = [
                { text: '小逸罒不迷茫', color: 'color-1' },
                { text: '创造模式', color: 'color-2' },
                { text: '我的世界', color: 'color-3' },
                { text: '建筑大师', color: 'color-4' },
                { text: '红石科技', color: 'color-5' },
                { text: '无限可能', color: 'color-6' },
                { text: '探索世界', color: 'color-7' },
                { text: '冒险精神', color: 'color-1' },
                { text: '自由创造', color: 'color-2' },
                { text: '方块世界', color: 'color-3' },
                { text: '匠心筑梦', color: 'color-4' },
                { text: '不迷茫', color: 'color-5' },
                { text: '创造无限', color: 'color-6' },
                { text: '玩转红石', color: 'color-7' },
                { text: '生存挑战', color: 'color-1' },
                { text: '喜欢我的世界', color: 'color-2' },
                { text: '建筑党', color: 'color-3' },
                { text: '红石玩家', color: 'color-4' },
                { text: '冒险家', color: 'color-5' },
                { text: '创造者', color: 'color-6' },
                { text: '小逸', color: 'color-7' },
                { text: '我的世界真好玩', color: 'color-1' },
                { text: '一起冒险吧', color: 'color-2' },
                { text: '建造梦想', color: 'color-3' },
                { text: '红石逻辑', color: 'color-4' },
                { text: '生存大师', color: 'color-5' },
                { text: '创造无限', color: 'color-6' },
                { text: '探索未知', color: 'color-7' }
            ];
            function createDanmaku() {
                var el = document.createElement('div');
                var data = danmakuList[Math.floor(Math.random() * danmakuList.length)];
                el.className = 'danmaku-item ' + data.color;
                el.textContent = data.text;
                el.style.top = (5 + Math.random() * 85) + '%';
                el.style.fontSize = (0.5 + Math.random() * 0.5) + 'rem';
                el.style.opacity = 0.03 + Math.random() * 0.10;
                var duration = 12 + Math.random() * 18;
                el.style.animationDuration = duration + 's';
                el.style.animationDelay = Math.random() * 25 + 's';
                danmakuContainer.appendChild(el);
                setTimeout(function() { if (el.parentNode) el.remove(); }, (duration + 25) * 1000 + 500);
            }
            for (var i = 0; i < 50; i++) {
                setTimeout(createDanmaku, i * 200);
            }
            setInterval(createDanmaku, 1000 + Math.random() * 2000);
        })();
    </script>
</body>
</html>
